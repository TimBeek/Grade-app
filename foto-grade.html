<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#E30613">
<title>ReMarkt — Foto Grading (experiment)</title>
<style>
  :root { --rood: #E30613; --grijs: #f4f4f5; --rand: #d4d4d8; --tekst: #18181b; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: var(--tekst); background: #fff; }
  header { background: var(--rood); color: #fff; padding: 14px 18px; display: flex; align-items: center; gap: 10px; }
  header h1 { font-size: 17px; margin: 0; font-weight: 600; }
  header .exp { font-size: 11px; background: rgba(255,255,255,.2); padding: 2px 8px; border-radius: 999px; }
  main { max-width: 640px; margin: 0 auto; padding: 18px; }
  .kaart { border: 1px solid var(--rand); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .stap-balk { display: flex; gap: 6px; margin-bottom: 14px; }
  .stap-balk .dot { flex: 1; height: 6px; border-radius: 3px; background: var(--rand); }
  .stap-balk .dot.done { background: var(--rood); }
  .stap-balk .dot.active { background: #fca5a5; }
  h2 { font-size: 18px; margin: 0 0 4px; }
  .sub { color: #71717a; font-size: 14px; margin: 0 0 14px; }
  video, .preview { width: 100%; border-radius: 10px; background: #000; aspect-ratio: 4/3; object-fit: cover; }
  .preview { object-fit: contain; background: var(--grijs); }
  .rij { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  button { font: inherit; padding: 10px 16px; border-radius: 10px; border: 1px solid var(--rand); background: #fff; cursor: pointer; }
  button.primary { background: var(--rood); color: #fff; border-color: var(--rood); font-weight: 600; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .chips { font-size: 12px; color: #71717a; margin-top: 8px; }
  .chip { display: inline-block; background: var(--grijs); border-radius: 999px; padding: 2px 8px; margin: 2px 4px 2px 0; }
  label.file { display: inline-block; }
  label.file input { display: none; }
  /* resultaten */
  .ond { border: 1px solid var(--rand); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
  .ond-kop { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .ond-kop strong { font-size: 15px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; }
  .zek-hoog { background: #dcfce7; color: #166534; }
  .zek-mid { background: #fef9c3; color: #854d0e; }
  .zek-laag { background: #fee2e2; color: #991b1b; }
  select, .trig { font: inherit; }
  select { padding: 6px 8px; border-radius: 8px; border: 1px solid var(--rand); margin-top: 8px; width: 100%; }
  .onderbouwing { font-size: 13px; color: #52525b; margin-top: 8px; font-style: italic; }
  .trigs { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px 14px; }
  .trigs label { font-size: 13px; display: flex; gap: 5px; align-items: center; }
  .grade-uit { text-align: center; padding: 20px; border-radius: 12px; background: var(--grijs); }
  .grade-uit .g { font-size: 48px; font-weight: 800; line-height: 1; }
  .melding { padding: 12px; border-radius: 10px; background: #fef9c3; color: #854d0e; font-size: 14px; margin-bottom: 12px; }
  .fout { background: #fee2e2; color: #991b1b; }
  .spinner { text-align: center; padding: 30px; color: #71717a; }
</style>
</head>
<body>
<header>
  <h1>ReMarkt Foto Grading</h1>
  <span class="exp">experiment</span>
</header>
<main id="app"></main>

<!-- Hergebruikt de bestaande grading-engine ZONDER wijziging. -->
<script src="assets/grading-engine.js"></script>
<script src="assets/foto-grade.js"></script>
</body>
</html>
