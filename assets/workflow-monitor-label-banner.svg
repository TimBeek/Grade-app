<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 360" role="img" aria-labelledby="title desc">
  <title id="title">Monitor label workflow illustration</title>
  <desc id="desc">A left-to-right ReMarkt process illustration for scanning a monitor, choosing a grade, printing a label and completing registration.</desc>
  <defs>
    <linearGradient id="softRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7f7"/>
      <stop offset="1" stop-color="#f5f6f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#171717" flood-opacity=".10"/>
    </filter>
  </defs>
  <rect width="1440" height="360" fill="#ffffff"/>
  <path d="M72 272 C230 222, 318 300, 488 244 S808 214, 950 252 S1230 312, 1364 246" fill="none" stroke="#f2f2ef" stroke-width="54" stroke-linecap="round"/>

  <g font-family="Inter, Arial, Helvetica, sans-serif">
    <text x="72" y="54" font-size="26" font-weight="800" fill="#171717">MONITOR LABEL WORKFLOW</text>
    <text x="72" y="83" font-size="13" font-weight="700" fill="#6b6b66">Scan first, then choose grade and print the monitor label.</text>
  </g>

  <g transform="translate(84 125)" filter="url(#shadow)">
    <circle cx="26" cy="30" r="18" fill="#E30613"/>
    <text x="26" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="800" fill="#fff">1</text>
    <rect x="76" y="2" width="150" height="92" rx="10" fill="#273043"/>
    <rect x="90" y="16" width="122" height="66" rx="5" fill="#b9d9e8"/>
    <rect x="132" y="94" width="30" height="28" rx="4" fill="#273043"/>
    <rect x="104" y="118" width="86" height="10" rx="5" fill="#273043"/>
    <rect x="238" y="40" width="52" height="72" rx="10" fill="#f5f6f7" stroke="#d8d8d2" stroke-width="4"/>
    <rect x="252" y="55" width="24" height="6" rx="3" fill="#E30613"/>
    <rect x="252" y="70" width="24" height="6" rx="3" fill="#273043"/>
    <rect x="252" y="85" width="24" height="6" rx="3" fill="#273043"/>
    <text x="76" y="154" font-family="Arial" font-size="15" font-weight="800" fill="#171717">SCAN MONITOR</text>
    <text x="76" y="176" font-family="Arial" font-size="12" font-weight="700" fill="#6b6b66">Barcode or list select</text>
  </g>

  <path d="M394 177 H514" fill="none" stroke="#E30613" stroke-width="10" stroke-linecap="round"/>
  <path d="M514 177 l-20 -16 v32 z" fill="#E30613"/>

  <g transform="translate(548 112)" filter="url(#shadow)">
    <circle cx="22" cy="43" r="18" fill="#E30613"/>
    <text x="22" y="49" text-anchor="middle" font-family="Arial" font-size="16" font-weight="800" fill="#fff">2</text>
    <rect x="76" y="18" width="210" height="128" rx="16" fill="url(#softRed)" stroke="#e4e4de" stroke-width="4"/>
    <text x="104" y="54" font-family="Arial" font-size="15" font-weight="800" fill="#171717">KIES GRADE</text>
    <g transform="translate(104 74)" font-family="Arial" font-weight="900" font-size="22">
      <rect x="0" y="0" width="38" height="38" rx="8" fill="#854F0B"/>
      <text x="19" y="27" text-anchor="middle" fill="#fff">A</text>
      <rect x="50" y="0" width="38" height="38" rx="8" fill="#0C447C"/>
      <text x="69" y="27" text-anchor="middle" fill="#fff">B</text>
      <rect x="100" y="0" width="38" height="38" rx="8" fill="#72243E"/>
      <text x="119" y="27" text-anchor="middle" fill="#fff">C</text>
      <rect x="150" y="0" width="38" height="38" rx="8" fill="#791F1F"/>
      <text x="169" y="27" text-anchor="middle" fill="#fff">X</text>
    </g>
    <text x="76" y="184" font-family="Arial" font-size="15" font-weight="800" fill="#171717">AFTER SCAN</text>
    <text x="76" y="206" font-family="Arial" font-size="12" font-weight="700" fill="#6b6b66">Grade choice appears here</text>
  </g>

  <path d="M868 177 H988" fill="none" stroke="#E30613" stroke-width="10" stroke-linecap="round"/>
  <path d="M988 177 l-20 -16 v32 z" fill="#E30613"/>

  <g transform="translate(1028 116)" filter="url(#shadow)">
    <circle cx="20" cy="38" r="18" fill="#E30613"/>
    <text x="20" y="44" text-anchor="middle" font-family="Arial" font-size="16" font-weight="800" fill="#fff">3</text>
    <rect x="76" y="18" width="150" height="98" rx="12" fill="#273043"/>
    <rect x="93" y="0" width="116" height="50" rx="8" fill="#f6f6f2" stroke="#d8d8d2" stroke-width="4"/>
    <rect x="100" y="12" width="102" height="8" rx="4" fill="#171717"/>
    <rect x="100" y="28" width="70" height="7" rx="3.5" fill="#E30613"/>
    <rect x="104" y="64" width="94" height="34" rx="5" fill="#f6f6f2"/>
    <rect x="116" y="75" width="70" height="6" rx="3" fill="#E30613"/>
    <rect x="116" y="88" width="50" height="5" rx="2.5" fill="#273043"/>
    <text x="76" y="154" font-family="Arial" font-size="15" font-weight="800" fill="#171717">PRINT LABEL</text>
    <text x="76" y="176" font-family="Arial" font-size="12" font-weight="700" fill="#6b6b66">Device, grade, video in</text>
  </g>

  <path d="M1238 177 H1328" fill="none" stroke="#E30613" stroke-width="10" stroke-linecap="round"/>
  <path d="M1328 177 l-20 -16 v32 z" fill="#E30613"/>

  <g transform="translate(1286 118)" filter="url(#shadow)">
    <circle cx="22" cy="36" r="18" fill="#E30613"/>
    <text x="22" y="42" text-anchor="middle" font-family="Arial" font-size="16" font-weight="800" fill="#fff">4</text>
    <circle cx="102" cy="62" r="50" fill="#f1fbf7" stroke="#277A63" stroke-width="8"/>
    <path d="M76 62 l18 18 36 -42" fill="none" stroke="#277A63" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="48" y="154" font-family="Arial" font-size="15" font-weight="800" fill="#171717">COMPLETE</text>
    <text x="48" y="176" font-family="Arial" font-size="12" font-weight="700" fill="#6b6b66">Traceable monitor intake</text>
  </g>
</svg>
